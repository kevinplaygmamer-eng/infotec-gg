services:
  - type: web
    name: infotec-loja-online
    runtime: node
    branch: main
    rootDir: .
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./meubanco.db
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
